<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0300"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>
    <linearGradient id="glow-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c03020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c03020" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="140" fill="url(#bg)"/>
  <rect width="120" height="140" fill="url(#glow-r)"/>
  <!-- Scroll body -->
  <rect x="28" y="28" width="64" height="78" rx="4" fill="rgba(180,120,30,0.10)" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- Top rod -->
  <rect x="22" y="24" width="76" height="10" rx="5" fill="rgba(180,110,20,0.18)" stroke="url(#gold)" stroke-width="1"/>
  <!-- Bottom rod -->
  <rect x="22" y="104" width="76" height="10" rx="5" fill="rgba(180,110,20,0.18)" stroke="url(#gold)" stroke-width="1"/>
  <!-- Text lines -->
  <line x1="38" y1="46" x2="82" y2="46" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="56" x2="82" y2="56" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="38" y1="66" x2="70" y2="66" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="38" y1="76" x2="82" y2="76" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="86" x2="62" y2="86" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Star/seal -->
  <circle cx="60" cy="66" r="14" fill="rgba(180,100,20,0.08)" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <path d="M60 55 l2.5 7.5 h7.5 l-6 4.5 2.5 7.5-6-4.5-6 4.5 2.5-7.5-6-4.5 h7.5 z" fill="url(#gold)" opacity="0.55"/>
</svg>
