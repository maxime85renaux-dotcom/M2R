<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0300"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>
    <linearGradient id="glow-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3050b0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3050b0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="140" fill="url(#bg)"/>
  <rect width="120" height="140" fill="url(#glow-b)"/>
  <!-- Left page -->
  <path d="M16 30 Q18 28 60 30 L60 112 Q18 114 16 112 z" fill="rgba(180,110,20,0.08)" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- Right page -->
  <path d="M60 30 Q102 28 104 30 L104 112 Q102 114 60 112 z" fill="rgba(180,110,20,0.08)" stroke="url(#gold)" stroke-width="1.2"/>
