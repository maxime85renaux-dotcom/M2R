  <line x1="24" y1="46" x2="54" y2="47" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="55" x2="54" y2="56" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="64" x2="48" y2="65" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="73" x2="54" y2="74" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>
  <line x1="24" y1="82" x2="44" y2="83" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="24" y1="91" x2="54" y2="92" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Right page lines -->
  <line x1="66" y1="46" x2="96" y2="47" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="66" y1="55" x2="96" y2="56" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="66" y1="64" x2="90" y2="65" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="66" y1="73" x2="96" y2="74" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>
  <line x1="66" y1="82" x2="86" y2="83" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="66" y1="91" x2="96" y2="92" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Cover curve top -->
  <path d="M16 30 Q38 22 60 30" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M60 30 Q82 22 104 30" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Cover curve bottom -->
  <path d="M16 112 Q38 120 60 112" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M60 112 Q82 120 104 112" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.4"/>
