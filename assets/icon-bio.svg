<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0300"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40c878" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#20a050" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glow-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20a040" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#20a040" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="140" fill="url(#bg)"/>
  <rect width="120" height="140" fill="url(#glow-g)"/>
  <!-- Flask neck -->
  <rect x="49" y="20" width="22" height="28" rx="3" fill="rgba(180,110,20,0.08)" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- Flask stopper -->
  <rect x="46" y="16" width="28" height="8" rx="3" fill="rgba(180,110,20,0.15)" stroke="url(#gold)" stroke-width="1"/>
  <!-- Flask body -->
  <path d="M49 48 Q30 68 30 90 Q30 118 60 118 Q90 118 90 90 Q90 68 71 48 z" fill="url(#green)" stroke="url(#gold)" stroke-width="1.4"/>
  <!-- Liquid inside -->
  <path d="M36 95 Q40 88 60 88 Q80 88 84 95 Q80 116 60 116 Q40 116 36 95 z" fill="rgba(40,180,80,0.18)"/>
  <!-- Bubbles -->
  <circle cx="50" cy="96" r="3" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>
  <circle cx="65" cy="102" r="2" stroke="url(#gold)" stroke-width="0.8" opacity="0.3"/>
  <circle cx="57" cy="108" r="1.5" stroke="url(#gold)" stroke-width="0.7" opacity="0.3"/>
  <!-- Shine line -->
  <path d="M38 80 Q42 65 52 56" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round"/>
  <!-- Plus / cross symbol -->
  <line x1="60" y1="75" x2="60" y2="85" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="55" y1="80" x2="65" y2="80" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
