<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none">
  <defs>
    <radialGradient id="bg-radial" cx="50%" cy="35%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2a0e02"/>
      <stop offset="55%" stop-color="#1e0901"/>
      <stop offset="100%" stop-color="#0e0300"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="50%" stop-color="#c89030"/>
      <stop offset="100%" stop-color="#9a6018"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#9a6018"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#8a5818"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="700" fill="url(#bg-radial)"/>
  <rect width="600" height="700" fill="url(#vignette)"/>
  <ellipse cx="300" cy="700" rx="320" ry="130" fill="#3a1200" opacity="0.3"/>
  <defs>
    <linearGradient id="gliq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ac870" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#18a040" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="glow-g" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#30c060" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#30c060" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Bouchon -->
  <rect x="232" y="100" width="136" height="46" rx="14"
        fill="rgba(180,110,20,0.12)" stroke="url(#gv)" stroke-width="2.8"/>
  <!-- Col fiole -->
  <rect x="250" y="146" width="100" height="110" rx="8"
        fill="rgba(180,110,20,0.06)" stroke="url(#gv)" stroke-width="2.4"/>
  <!-- Corps fiole large -->
  <path d="M250,256 Q148,330 145,450 Q142,580 300,582 Q458,582 455,450 Q452,330 350,256 Z"
        fill="url(#gliq)" stroke="url(#gd)" stroke-width="3.5" filter="url(#glow)"/>
  <!-- Lueur verte ambiante -->
  <ellipse cx="300" cy="480" rx="145" ry="90" fill="url(#glow-g)"/>
  <!-- Liquide -->
  <path d="M158,468 Q170,445 300,443 Q430,445 442,468 Q434,574 300,576 Q166,574 158,468 Z"
        fill="rgba(30,160,60,0.14)"/>
  <!-- Reflet flanc gauche -->
  <path d="M162,388 Q175,344 208,310"
        stroke="rgba(255,255,255,0.10)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Croix -->
  <line x1="300" y1="346" x2="300" y2="408" stroke="url(#gv)" stroke-width="5"
        stroke-linecap="round" opacity="0.42"/>
  <line x1="269" y1="377" x2="331" y2="377" stroke="url(#gv)" stroke-width="5"
        stroke-linecap="round" opacity="0.42"/>
  <!-- Bulles -->
  <circle cx="248" cy="488" r="14" stroke="url(#gv)" stroke-width="2" opacity="0.35"/>
  <circle cx="332" cy="518" r="9"  stroke="url(#gv)" stroke-width="1.8" opacity="0.26"/>
  <circle cx="288" cy="544" r="6"  stroke="url(#gv)" stroke-width="1.6" opacity="0.25"/>
  <!-- Glow vert bas -->
  <ellipse cx="300" cy="510" rx="160" ry="70" fill="#18c050" opacity="0.05"/>
  <g transform="translate(568,662)" opacity="0.70">
    <path d="M0,-10 L2.2,-2.2 L10,0 L2.2,2.2 L0,10 L-2.2,2.2 L-10,0 L-2.2,-2.2 Z"
          fill="#8a8480"/>
  </g>
</svg>