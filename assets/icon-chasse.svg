<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0300"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>
    <linearGradient id="glow-o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b04010" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b04010" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="140" fill="url(#bg)"/>
  <rect width="120" height="140" fill="url(#glow-o)"/>
  <!-- Bow arc -->
  <path d="M42 22 Q18 70 42 118" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Bow string -->
  <line x1="42" y1="22" x2="42" y2="118" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3,2" opacity="0.45"/>
  <!-- Arrow shaft -->
  <line x1="30" y1="70" x2="92" y2="70" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <!-- Arrow tip -->
  <path d="M92 70 l-10-5 4 5-4 5 z" fill="url(#gold)" opacity="0.9"/>
  <!-- Arrow feathers -->
  <path d="M36 70 l-6-8 2 8-2 8 z" fill="url(#gold)" opacity="0.55"/>
  <!-- Decorative notch on bow -->
  <circle cx="42" cy="22" r="2.5" fill="url(#gold)" opacity="0.7"/>
  <circle cx="42" cy="118" r="2.5" fill="url(#gold)" opacity="0.7"/>
  <!-- Cross-hair hint -->
  <circle cx="78" cy="54" r="10" stroke="url(#gold)" stroke-width="0.8" opacity="0.25"/>
  <line x1="78" y1="44" x2="78" y2="64" stroke="url(#gold)" stroke-width="0.6" opacity="0.2"/>
  <line x1="68" y1="54" x2="88" y2="54" stroke="url(#gold)" stroke-width="0.6" opacity="0.2"/>
</svg>
